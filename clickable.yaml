clickable_minimum_required: 8.8.0
framework: ubuntu-touch-24.04-1.x
builder: cmake
kill: emedia
skip_review: true
libraries:
    gstlibav:
        dependencies_host:
            - build-essential
            - ninja-build
            - meson
            - flex
            - bison
        dependencies_target:
            - libnice-dev 
            - nasm 
            - libsrtp2-dev 
            - gsoap 
            - libgsoap-dev 
            - libmicrohttpd-dev 
            - libconfig-dev 
            - libspdlog-dev 
            - libusrsctp-dev 
            - protobuf-compiler 
            - libprotobuf-dev 
            - libpciaccess-dev  
            #- libboost-all-dev 
            - rapidjson-dev  
            - librabbitmq-dev
            - libavcodec-dev 
            - libavformat-dev 
            - libavutil-dev 
            - libavfilter-dev 
            - ffmpeg
        builder: custom
        build:
            - wget https://gitlab.com/gstreamer/gstreamer/-/archive/1.24/gstreamer-1.24.tar.gz
            - tar xvf gstreamer-1.24.tar.gz
            #- mv gstreamer-1.24-6aa055e9606104be1f095896d0b292b06dfb8dd9 gstreamer-1.24
            - "perl ${ROOT}/patch-gstreamer.pl ${ROOT} ${BUILD_DIR}"
            - meson --cross-file "${SRC_DIR}/dist/lomiri-${ARCH_TRIPLET}.ini" --prefix=/opt/click.ubuntu.com/emedia.maxperl/current -Dauto_features=disabled -Dpython=disabled -Dlibav=enabled -Dlibnice=enabled -Dbase=enabled -Dgood=enabled -Dugly=disabled -Dbad=enabled -Ddevtools=disabled -Drtsp_server=disabled -Dgst-examples=disabled -Dqt5=disabled -Dtools=enabled -Dtests=disabled -Dexamples=disabled -Dintrospection=disabled -Dnls=disabled -Ddoc=disabled -Dgstreamer:ptp-helper-permissions=none -Dlibnice:gupnp=auto -Dlibnice:gstreamer=enabled -Dlibnice:crypto-library=auto -Dgst-plugins-base:playback=enabled -Dgst-plugins-base:typefind=enabled -Dgst-plugins-base:app=enabled -Dgst-plugins-base:videoconvertscale=enabled -Dgst-plugins-good:rtsp=enabled -Dgst-plugins-good:rtpmanager=enabled -Dgst-plugins-good:autodetect=enabled -Dgst-plugins-good:udp=enabled -Dgst-plugins-good:rtp=enabled -Dgst-plugins-good:debugutils=enabled -Dgst-plugins-good:multifile=enabled -Dgst-plugins-good:isomp4=enabled -Dgst-plugins-bad:webrtc=enabled -Dgst-plugins-bad:codectimestamper=enabled -Dgst-plugins-bad:videoparsers=enabled -Dgst-plugins-bad:dtls=enabled -Dgst-plugins-bad:srtp=enabled -Dgst-plugins-bad:sctp=enabled -Dgst-plugins-bad:debugutils=enabled build "${BUILD_DIR}/gstreamer-1.24"
            #- python3 "$ROOT/meson/meson.py" --cross-file "${SRC_DIR}/dist/lomiri-${ARCH_TRIPLET}.ini" --prefix=/opt/click.ubuntu.com/emedia.maxperl/current -Dauto_features=enabled -Dbase=enabled -Dgood=enabled -Dbad=disabled -Dugly=disabled -Dlibav=enabled -Dtools=enabled -Dgstreamer:dbghelp=disabled -Dpython=disabled -Ddevtools=disabled -Drtsp_server=disabled -Dgst-examples=disabled -Dqt5=disabled -Dtests=disabled -Dexamples=disabled -Dintrospection=disabled -Dnls=disabled -Ddoc=disabled -Drs=disabled build "${BUILD_DIR}/gstreamer-1.26"
            - ninja -C build
            - env DESTDIR="${INSTALL_DIR}" ninja -C build install
    perl:
        dependencies_host:
            - build-essential
        builder: custom
        build:
            - "perl ${ROOT}/install-perl.pl ${BUILD_DIR}, ${INSTALL_DIR}"
    efl:
        dependencies_host:
            - ninja-build
            - meson
            - build-essential
            - check
            - libc-bin
            - libedje-bin
            - libelementary-bin
            - libeet-bin
            - libeolian-bin
        dependencies_target:
            - libinput-dev 
            - libssl-dev 
            - libsystemd-dev 
            - libjpeg-dev 
            - libglib2.0-dev 
            - libgstreamer1.0-dev 
            - libfreetype-dev 
            - libfontconfig-dev 
            - libfribidi-dev 
            - libavahi-client-dev 
            - libharfbuzz-dev 
            - libibus-1.0-dev 
            - libx11-dev 
            - libxext-dev 
            - libxrender-dev 
            - libgl1-mesa-dev 
            - libopenjp2-7-dev 
            - libwebp-dev 
            - libgif-dev 
            - libtiff5-dev 
            - libpoppler-dev 
            - libpoppler-cpp-dev 
            - libspectre-dev 
            - libraw-dev 
            - librsvg2-dev 
            - libudev-dev 
            - libmount-dev 
            - libdbus-1-dev 
            - libpulse-dev 
            - libsndfile1-dev 
            - libxcursor-dev 
            - libxcomposite-dev 
            - libxinerama-dev 
            - libxrandr-dev 
            - libxtst-dev 
            - libxss-dev 
            - libgstreamer-plugins-base1.0-dev
            - libgstreamer-plugins-good1.0-dev
            - libscim-dev 
            - libxdamage-dev
            - libwebp-dev 
            - libunwind-dev 
            - libheif-dev
            - liblua5.1.0-dev
            - liblua5.1.0
            - libxkbcommon-x11-dev
            #- libextutils-pkgconfig-perl
            - libavif-dev
            - libyuv-dev
        builder: custom
        build:
            - wget https://download.enlightenment.org/rel/libs/efl/efl-1.28.1.tar.xz
            - tar xvf efl-1.28.1.tar.xz
            - "perl ${ROOT}/patch-emotion.pl ${ROOT} ${BUILD_DIR}"
            - meson --cross-file "${SRC_DIR}/dist/lomiri-${ARCH_TRIPLET}.ini" --prefix=/opt/click.ubuntu.com/emedia.maxperl/current -Dbuild-tests=false -Dbindings="" -Dwl=true -Dopengl=full -Deeze=false -Dinput=false -Deina-magic-debug=false -Dbuild-tests=false build "${BUILD_DIR}/efl-1.28.1"
            - ninja -C build
            - env DESTDIR="${INSTALL_DIR}" ninja -C build install
            - rm ${INSTALL_DIR}/opt/click.ubuntu.com/emedia.maxperl/current/share/gdb/auto-load/usr/lib/libeo.so.1.28.1-gdb.py
